services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - .env.example
    environment:
      PROVIDER_MODE: mock
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - digital-avatar

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - .env.example
    environment:
      PROVIDER_MODE: mock
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    networks:
      - digital-avatar

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "4173:4173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - digital-avatar

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - digital-avatar

networks:
  digital-avatar:
    driver: bridge

volumes:
  ollama_data:
