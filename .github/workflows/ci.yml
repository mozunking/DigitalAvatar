name: ci

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: sqlite:///./data/ci.db
      JWT_SECRET: test-secret
      PROVIDER_MODE: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API dependencies
        run: pip install --upgrade pip && pip install .[dev]
      - name: Compile API
        run: python -m compileall app
      - name: Run API tests
        run: pytest

  web-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install API dependencies for OpenAPI generation
        run: |
          python -m pip install --upgrade pip
          python -m pip install "../api[dev]"
      - name: Install web dependencies
        run: npm ci
      - name: Verify generated OpenAPI types
        run: npm run check:types
      - name: Run web tests
        run: npm run test -- --run
      - name: Build web
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    env:
      PROVIDER_MODE: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install smoke test dependencies
        run: python -m pip install --upgrade pip httpx pytest
      - name: Prepare runtime directories
        run: mkdir -p data logs
      - name: Validate compose file
        run: docker compose -f deploy/docker/docker-compose.yml config
      - name: Build and start demo stack
        run: docker compose -f deploy/docker/docker-compose.yml up -d --build api worker web
      - name: Wait for API health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 3
          done
          docker compose -f deploy/docker/docker-compose.yml logs api worker web
          exit 1
      - name: Wait for web entrypoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4173/ > /tmp/digital-avatar-web.html; then
              exit 0
            fi
            sleep 3
          done
          docker compose -f deploy/docker/docker-compose.yml logs web
          exit 1
      - name: Run compose smoke tests
        run: pytest tests/smoke/test_compose_stack.py -v
      - name: Stop compose services
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml down -v
